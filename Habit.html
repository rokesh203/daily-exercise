<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker (No Login)</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>
:root{--bg:#eef3f9;--card:#fff;--text:#222;--primary:#4CAF50;--blue:#e3f2fd;--green:#f1f8e9;}
body.dark{--bg:#121212;--card:#1e1e1e;--text:#fff;}
body{margin:0;font-family:Poppins;background:var(--bg);color:var(--text);} 
header{display:flex;justify-content:space-between;padding:12px;background:var(--primary);color:#fff;}
button{border:none;padding:8px 12px;border-radius:8px;cursor:pointer;}
.container{padding:10px;overflow-x:auto;}
table{border-collapse:collapse;width:100%;background:var(--card);} th,td{border:1px solid #ddd;padding:8px;text-align:center;} th{background:var(--blue);} .progress-row{background:var(--green);font-weight:600;} .habit-col{text-align:left;font-weight:600;}
.toggle-btn{position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;font-size:30px;background:var(--primary);color:#fff;}
</style></head><body><header>
  <h3 id="title"></h3>
  <div>
    <button onclick="prevWeek()">◀</button>
    <button onclick="nextWeek()">▶</button>
    <button onclick="showAnalysis()">Analysis</button>
    <button onclick="toggleTheme()">🌙</button>
  </div>
</header><div class="container" id="main"></div><div class="container" id="analysis" style="display:none">
  <h3>Daily Analysis</h3>
  <canvas id="dailyChart"></canvas>
  <h3>Weekly Analysis</h3>
  <canvas id="weeklyChart"></canvas>
  <h3>Overall Progress</h3>
  <canvas id="progressChart"></canvas>
</div><button class="toggle-btn" onclick="addHabit()">+</button>

<script>
let habits = JSON.parse(localStorage.getItem('habits')) || [];
let currentWeek = 0;
let currentDate = new Date();

function save(){ localStorage.setItem('habits', JSON.stringify(habits)); }

function render(){
 analysis.style.display='none'; main.style.display='block';
 title.innerText=currentDate.toLocaleString('default',{month:'long'})+' Week '+(currentWeek+1);

 let html='<table><tr><th>Habit</th>';
 for(let i=0;i<7;i++) html+='<th>Day '+(i+1)+'</th>';
 html+='</tr>';

 habits.forEach((h,i)=>{
 html+=`<tr><td class='habit-col'>${h.name}</td>`;
 for(let d=0;d<7;d++){
 let checked=h.days?.[currentWeek]?.[d]||false;
 html+=`<td><input type='checkbox' ${checked?'checked':''} onclick='toggle(${i},${d})'></td>`;
 }
 html+='</tr>';
 });

 let doneArr=[],totalArr=[];
 html+='<tr class="progress-row"><td>Progress %</td>';
 for(let d=0;d<7;d++){
 let done=0,total=0;
 habits.forEach(h=>{total++; if(h.days?.[currentWeek]?.[d]) done++;});
 doneArr[d]=done; totalArr[d]=total;
 html+=`<td>${total?Math.round(done/total*100):0}%</td>`;
 }
 html+='</tr>';

 html+='<tr class="progress-row"><td>Done</td>';
 for(let d=0;d<7;d++) html+=`<td>${doneArr[d]||0}</td>`;
 html+='</tr>';

 html+='<tr class="progress-row"><td>Not Done</td>';
 for(let d=0;d<7;d++) html+=`<td>${(totalArr[d]||0)-(doneArr[d]||0)}</td>`;
 html+='</tr></table>';

 main.innerHTML=html;
}

function toggle(i,d){
 if(!habits[i].days) habits[i].days={};
 if(!habits[i].days[currentWeek]) habits[i].days[currentWeek]=[];
 habits[i].days[currentWeek][d]=!habits[i].days[currentWeek][d];
 save(); render();
}

function addHabit(){
 let name=prompt('Enter habit');
 if(!name) return;
 habits.push({name,days:{}});
 save(); render();
}

function nextWeek(){currentWeek++;if(currentWeek>=4){currentWeek=0;currentDate.setMonth(currentDate.getMonth()+1);}render();}
function prevWeek(){currentWeek--;if(currentWeek<0){currentWeek=3;currentDate.setMonth(currentDate.getMonth()-1);}render();}

function toggleTheme(){document.body.classList.toggle('dark');}

function showAnalysis(){
 main.style.display='none'; analysis.style.display='block';

 let daily=[];
 for(let d=0;d<7;d++){
 let done=0,total=0;
 habits.forEach(h=>{total++;if(h.days?.[currentWeek]?.[d])done++;});
 daily.push(total?Math.round(done/total*100):0);
 }

 new Chart(dailyChart,{type:'bar',data:{labels:['D1','D2','D3','D4','D5','D6','D7'],datasets:[{data:daily}]}});

 let totalDone=0,totalAll=0;
 habits.forEach(h=>{
 Object.values(h.days||{}).forEach(arr=>{
 arr.forEach(v=>{totalAll++;if(v)totalDone++;});
 });
 });

 new Chart(progressChart,{type:'doughnut',data:{labels:['Done','Not Done'],datasets:[{data:[totalDone,totalAll-totalDone]}]}});
}

render();
</script></body>
</html>
